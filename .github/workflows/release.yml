name: Release BTTInstrumentor

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: |
          cd BTTInstrumentor
          swift build -c release --product BTTInstrumentor --triple arm64-apple-macosx
          swift build -c release --product BTTInstrumentor --triple x86_64-apple-macosx
          mkdir -p ../release
          lipo -create -output ../release/BTTInstrumentor \
            .build/arm64-apple-macosx/release/BTTInstrumentor \
            .build/x86_64-apple-macosx/release/BTTInstrumentor
          strip -rSTX ../release/BTTInstrumentor

      - name: Sign binary
        run: |
          codesign --sign - --force --options runtime release/BTTInstrumentor

      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          files: release/BTTInstrumentor
